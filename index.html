    <style>
      *, *::after, *::before { box-sizing: border-box; }
      :root {
        font-size: 16px; /* Base font size */
        
        /* Theme Colors */
        --bg-color-dark: #000000;
        --text-color-dark: #e6e6e6;
        --text-muted-dark: #888888;
        --border-color-dark: rgba(255, 255, 255, 0.12);
        --scanline-color-dark: rgba(255, 255, 255, 0.03);
        --social-icon-fill-dark: #e6e6e6;
        --glow-dark: 0 0 5px rgba(230, 230, 230, 0.2);

        --bg-color-light: #f4f4f4;
        --text-color-light: #1a1a1a;
        --text-muted-light: #666666;
        --border-color-light: rgba(0, 0, 0, 0.08);
        --scanline-color-light: rgba(0, 0, 0, 0.02);
        --glow-light: none;
      }

      body {
        margin: 0;
        font-family: "JetBrains Mono", monospace;
        font-weight: 300;
        font-optical-sizing: auto;
        text-transform: uppercase;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

        /* Default to Dark Theme */
        --bg-color: var(--bg-color-dark);
        --text-color: var(--text-color-dark);
        --text-muted: var(--text-muted-dark);
        --border-color: var(--border-color-dark);
        --scanline-color: var(--scanline-color-dark);
        --social-icon-fill: var(--social-icon-fill-dark);
        --glow: var(--glow-dark);

        color: var(--text-color);
        background-color: var(--bg-color);
        overflow-x: hidden;
        line-height: 1.5;
        transition: color 0.3s ease, background-color 0.3s ease;
      }

      body.light-theme {
        --bg-color: var(--bg-color-light);
        --text-color: var(--text-color-light);
        --text-muted: var(--text-muted-light);
        --border-color: var(--border-color-light);
        --scanline-color: var(--scanline-color-light);
        --social-icon-fill: var(--text-color-light);
        --glow: var(--glow-light);
      }

      body.no-scroll {
        overflow: hidden;
      }

      /* Scanlines & Vignette REMOVED to avoid clash with new BG */
      
      /* Selection */
      ::selection {
        background: var(--text-color);
        color: var(--bg-color);
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-color); }
      ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

      a { 
        text-decoration: none; 
        color: var(--text-color); 
        outline: none; 
        cursor: pointer;
        transition: color 0.2s ease;
      }
      a:hover { color: var(--text-color); text-shadow: var(--glow); }
      a:focus-visible { outline: 1px dashed var(--text-color); outline-offset: 4px; }

      .w-layout-grid { display: grid; grid-auto-columns: 1fr; }
      
      .page-wrapper { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
      .main-wrapper { 
        width: 100%; 
        max-width: 1400px; 
        margin: 0 auto; 
        padding: 4rem 2.5rem; 
      }
      .section_hero { width: 100%; }
      .padding-global { width: 100%; }
      .hero_wrapper { display: flex; flex-direction: column; gap: 6rem; }
      
      /* Navigation */
      .nav_component {
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 1.5rem;
      }
      .nav_list {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }
      .nav_item { display: flex; align-items: center; gap: 2rem; }
      .nav-title { 
        font-size: 1.25rem; 
        font-weight: 500;
        letter-spacing: -0.02em;
        text-shadow: var(--glow);
      }
      .nav-name { font-weight: 500; }
      
      .social-links { display: flex; gap: 1.5rem; align-items: center; }
      .social-icon svg {
        width: 20px;
        height: 20px;
        fill: var(--social-icon-fill);
        transition: opacity 0.3s ease, transform 0.2s ease;
      }
      .social-icon:hover svg {
        opacity: 0.8;
        transform: translateY(-1px);
      }

      /* Hero */
      .hero-section { display: flex; flex-direction: column; gap: 2rem; max-width: 900px; }
      .hero-bio {
        font-size: 1.125rem;
        line-height: 1.8;
        max-width: 65ch;
        text-transform: none;
        font-weight: 300;
        color: var(--text-muted);
      }
      .hero-bio strong, .hero-bio a {
        color: var(--text-color);
        font-weight: 400;
      }

      /* Content Sections */
      .content_section { display: flex; flex-direction: column; gap: 0rem; }
      .content-title { 
        font-size: 1.5rem; 
        font-weight: 500; 
        letter-spacing: -0.02em;
        margin: 0;
        text-shadow: var(--glow);
      }
      
      /* Grid List */
      .grid_list {
        align-items: baseline;
        grid-column-gap: 2rem;
        padding-top: 1.25rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--border-color);
        transition: background-color 0.2s ease;
      }
      .grid_list:not(.title-grid):hover {
        background-color: rgba(255, 255, 255, 0.02);
      }
      .grid_list:last-child { border-bottom: none; }
      .grid_list.title-grid { 
        border-bottom: 1px solid var(--border-color); 
        padding-bottom: 1.5rem;
        padding-top: 0;
        margin-bottom: 1rem;
      }
      
      .number-block { 
        font-size: 0.9rem; 
        color: var(--text-muted); 
        padding: 0.1rem 0;
        font-family: monospace;
      }
      .text-block { 
        font-size: 1.1rem; 
        display: block; 
        width: 100%; 
        color: var(--text-color); 
        padding: 0.1rem 0; 
      }
      .grid_item { position: relative; }
      
      /* Work Experience */
      .work-experience-grid { grid-template-columns: 3rem 1.5fr 1fr 1fr; }
      
      /* Projects */
      .projects-grid { grid-template-columns: 3rem 1fr; }
      .projects-grid .grid_item {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .projects-grid .text-block {
        font-size: 1.25rem;
        font-weight: 400;
        margin-bottom: 0.25rem;
      }
      .projects-grid .project-description {
        text-transform: none;
        font-size: 1rem;
        line-height: 1.6;
        padding: 0;
        margin: 0;
        font-weight: 300;
        color: var(--text-muted);
        max-width: 60ch;
      }
      
      /* Controls */
      .animation-toggle, .language-toggle, .theme-toggle {
        cursor: pointer;
        font-size: 0.9rem;
        color: var(--text-muted);
        user-select: none;
        transition: color 0.2s;
      }
      .animation-toggle:hover, .language-toggle:hover, .theme-toggle:hover {
        color: var(--text-color);
      }

      /* Burger Menu Styles */
      .burger-menu {
        display: none;
        position: fixed;
        top: 2rem;
        right: 2rem;
        z-index: 1001;
        cursor: pointer;
        background: var(--bg-color);
        padding: 10px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
      }
      .burger-icon {
        width: 24px;
        height: 18px;
        position: relative;
      }
      .burger-bar {
        display: block;
        position: absolute;
        height: 2px;
        width: 100%;
        background: var(--text-color);
        opacity: 1;
        left: 0;
        transition: .25s ease-in-out;
      }
      .burger-bar:nth-child(1) { top: 0px; }
      .burger-bar:nth-child(2) { top: 8px; }
      .burger-bar:nth-child(3) { top: 16px; }
      .burger-menu.open .burger-bar:nth-child(1) {
        top: 8px;
        transform: rotate(135deg);
      }
      .burger-menu.open .burger-bar:nth-child(2) {
        opacity: 0;
        left: -20px;
      }
      .burger-menu.open .burger-bar:nth-child(3) {
        top: 8px;
        transform: rotate(-135deg);
      }

      .nav-panel {
        position: fixed;
        top: 0;
        right: 0;
        width: 100%;
        max-width: 400px;
        height: 100vh;
        background-color: var(--bg-color);
        border-left: 1px solid var(--border-color);
        transform: translateX(100%);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 1000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 3rem;
        padding: 2rem;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
      }
      .nav-panel.open { transform: translateX(0); }
      .nav-panel-links {
          display: flex;
          flex-direction: column;
          gap: 2rem;
          text-align: center;
      }
      .nav-panel-links a {
          font-size: 1.5rem;
          cursor: pointer;
          font-weight: 400;
      }

      .footer-section {
        padding: 4rem 2.5rem;
        margin-top: 4rem;
        border-top: 1px solid var(--border-color);
        text-align: center;
        color: var(--text-muted);
      }
      
      /* Blog Styles */
      .blog-section {
          gap: 2rem;
          padding-top: 2rem;
      }
      
      .blog-post-date {
          color: var(--text-muted);
          font-size: 0.9rem;
          margin-bottom: 2rem;
      }
      
      .blog-post-content {
          font-size: 1.1rem;
          line-height: 1.8;
          max-width: 70ch;
          text-transform: none;
          font-weight: 300;
          color: var(--text-color);
      }
      .blog-post-content h3 {
        font-size: 1.5rem;
        margin-top: 3rem;
        margin-bottom: 1.5rem;
        font-weight: 500;
        color: var(--text-color);
      }
      
      .chart-container {
        width: 100%;
        max-width: 800px;
        margin: 3rem 0;
        padding: 1.5rem;
        border: 1px solid var(--border-color);
        background: rgba(255,255,255,0.01);
      }

      @media screen and (min-width: 768px) {
        .animation-toggle { display: block; }
      }

      @media screen and (max-width: 991px) {
        .main-wrapper { padding: 3rem 2rem; }
        .hero_wrapper { gap: 4rem; }
      }
      
      @media screen and (max-width: 767px) {
        .main-wrapper { padding: 1.5rem; }
        .nav_component .nav_item { display: none; }
        .burger-menu { display: block; }

        .grid_list { 
          grid-template-columns: 2rem 1fr; 
          grid-row-gap: 0.5rem;
          grid-column-gap: 1rem;
          align-items: start;
        }
        
        .work-experience-grid {
            display: grid;
            grid-template-columns: 2rem 1fr;
        }
        /* Make work experience items stack nicely on mobile */
        .work-experience-grid .grid_item:nth-child(3), /* Company */
        .work-experience-grid .grid_item:nth-child(4)  /* Date */
        {
            grid-column-start: 2;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .work-experience-grid .grid_item:nth-child(4) .text-block {
             font-size: 0.9rem;
             color: var(--text-muted);
        }

        .projects-grid { grid-template-columns: 2rem 1fr; }

        .content-title { font-size: 1.3rem; }
        .nav-title { font-size: 1.1rem; max-width: 200px; line-height: 1.4; }
      }

      .hover-effect {
        font-kerning: none; position: relative; white-space: normal;
      }
      .hover-effect .word {
        white-space: nowrap; display: inline-block; margin-right: 0.5em;
      }
      .hover-effect .word:last-child { margin-right: 0; }
      .hover-effect .char {
        position: relative; --opa: 0;
      }
      .hover-effect.hover-effect--cursor-square .char::after {
        content: ''; width: 1ch; top: 0; left: 0; position: absolute;
        opacity: var(--opa); background: currentColor; height: 100%;
      }

      /* NEW BACKGROUND STYLES */
      .bg-fixed-container {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-color: #000000;
        overflow: hidden;
        pointer-events: none;
      }

      .light-container {
        position: absolute;
        inset: -50%;
        z-index: 1;
        filter: blur(60px);
        transform: rotate(-20deg);
        pointer-events: none;
        will-change: transform;
      }

      .shimmer-band {
        position: absolute;
        width: 200%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        animation: sweep 18s infinite ease-in-out;
        opacity: 0.9;
      }

      .band {
        width: 100%;
        height: 4vh;
        background: linear-gradient(90deg, 
            transparent 0%, 
            rgba(120, 80, 50, 0.5) 15%, 
            rgba(220, 170, 110, 0.8) 30%, 
            rgba(220, 170, 110, 0.8) 70%, 
            rgba(120, 80, 50, 0.5) 85%, 
            transparent 100%);
        opacity: 1;
        margin-bottom: 30vh;
      }

      .ambient-glow {
        position: absolute;
        width: 100vw;
        height: 100vw;
        border-radius: 50%;
        z-index: 0;
        filter: blur(120px);
        will-change: transform, opacity;
      }

      .glow-top-right {
        top: -30%;
        right: -20%;
        background: radial-gradient(circle, rgba(220, 170, 110, 0.25) 0%, transparent 70%);
      }

      .glow-bottom-left {
        bottom: -30%;
        left: -20%;
        background: radial-gradient(circle, rgba(120, 80, 50, 0.15) 0%, transparent 70%);
      }

      @keyframes sweep {
        0%, 10% { transform: translateX(-120%) skewX(-20deg); }
        50% { transform: translateX(-45%) skewX(-5deg); }
        100% { transform: translateX(40%) skewX(10deg); }
      }

      .led-mask {
        position: absolute;
        inset: 0;
        z-index: 2;
        background-image: radial-gradient(circle at center, transparent 1.2px, #000 1.6px);
        background-size: 4px 4px;
        pointer-events: none;
        opacity: 0.9;
      }

      .led-mask::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        background-size: 100% 3px, 3px 100%;
      }

      .noise {
        position: absolute;
        inset: 0;
        z-index: 4;
        opacity: 0.08;
        pointer-events: none;
        background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
      }
    </style>
